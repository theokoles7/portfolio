<div class="page">

    <div class="page-header">
        
        <h1 class="page-title">Get in Touch</h1>

        <p class="page-subtitle">Have a question, collaboration, or just want to say hello?</p>

        <hr class="divider">

    </div>

    <div class="page-body">

        <form class="contact-form" action="https://formspree.io/f/mlezazoj" method="POST">

            <div class="field-row">

                <div class="field">

                    <label class="field-label" for="name">Name</label>

                    <input
                        class="field-input"
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Iron Man"
                        required
                    >

                </div>

                <div class="field">

                    <label class="field-label" for="email">E-mail</label>

                    <input
                        class="field-input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="tony@starkindustries.net"
                        required
                    >

                </div>

            </div>

            <div class="field">

                <label class="field-label" for="message">Message</label>

                <textarea
                    class="field-input"
                    id="message"
                    name="message"
                    placeholder="I <3 u 3000"
                    rows="7"
                    required
                ></textarea>

            </div>

            <div class="bottom">

                <div class="disclaimer">

                    Powered by <a href="formspree.io">Formspree</a>

                </div>

                <div class="form-actions">

                    <button class="btn btn-clear" type="reset">Clear</button>

                    <button class="btn btn-send" type="submit">Send</button>

                </div>

            </div>

        </form>

    </div>

</div>
